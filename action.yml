name: "upload-to-releases"
author: "ophub"
description: "Upload files to GitHub Releases using the GitHub REST API"
inputs:
  repo:
    description: "Target repository (<owner>/<repo>)"
    required: false
    default: "${{ github.repository }}"
  tag:
    description: "Release tag name (e.g. v1.0.0)"
    required: true
  artifacts:
    description: "File paths to upload (supports glob patterns and comma-separated values)"
    required: true
  allow_updates:
    description: "Update release metadata (name, body, flags) if tag already exists (true/false)"
    required: false
    default: "true"
  remove_artifacts:
    description: "Remove all existing assets before uploading (true/false)"
    required: false
    default: "false"
  replaces_artifacts:
    description: "Replace same-name assets with SHA-256 comparison (true/false)"
    required: false
    default: "true"
  upload_timeout:
    description: "Per-file upload timeout in minutes, 0 to disable (retries 3 times, stall guard active)"
    required: false
    default: "5"
  make_latest:
    description: "Mark as latest release (true/false/legacy)"
    required: false
    default: "true"
  prerelease:
    description: "Mark as pre-release (true/false)"
    required: false
    default: "false"
  draft:
    description: "Mark as draft (true/false)"
    required: false
    default: "false"
  name:
    description: "Release display name (defaults to tag)"
    required: false
    default: ""
  body:
    description: "Release body text in Markdown"
    required: false
    default: ""
  body_file:
    description: "Markdown file for release body (overrides body)"
    required: false
    default: ""
  out_log:
    description: "Enable detailed JSON logging (true/false)"
    required: false
    default: "false"
  gh_token:
    description: "GitHub token for API authentication (needs contents: write)"
    required: true

outputs:
  release_id:
    description: "Release ID"
    value: ${{ steps.upload.outputs.release_id }}
  html_url:
    description: "Release page URL"
    value: ${{ steps.upload.outputs.html_url }}
  upload_url:
    description: "Asset upload URL"
    value: ${{ steps.upload.outputs.upload_url }}
  assets:
    description: "JSON map of filename to download URL"
    value: ${{ steps.upload.outputs.assets }}

runs:
  using: "composite"
  steps:
    - id: upload
      shell: bash
      # All inputs that may contain arbitrary text (body, name, paths, …) are
      # passed as environment variables rather than command-line arguments.
      # This avoids shell-quoting issues with multi-line strings, special
      # characters, and glob patterns.
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_TAG: ${{ inputs.tag }}
        INPUT_ARTIFACTS: ${{ inputs.artifacts }}
        INPUT_ALLOW_UPDATES: ${{ inputs.allow_updates }}
        INPUT_REMOVE_ARTIFACTS: ${{ inputs.remove_artifacts }}
        INPUT_REPLACES_ARTIFACTS: ${{ inputs.replaces_artifacts }}
        INPUT_UPLOAD_TIMEOUT: ${{ inputs.upload_timeout }}
        INPUT_MAKE_LATEST: ${{ inputs.make_latest }}
        INPUT_PRERELEASE: ${{ inputs.prerelease }}
        INPUT_DRAFT: ${{ inputs.draft }}
        INPUT_NAME: ${{ inputs.name }}
        INPUT_BODY: ${{ inputs.body }}
        INPUT_BODY_FILE: ${{ inputs.body_file }}
        INPUT_OUT_LOG: ${{ inputs.out_log }}
      run: |
        # Print the action path and workflow run ID for diagnostics
        echo -e "Action path: ${{ github.action_path }}"
        echo -e "Workflow Run ID: ${GITHUB_RUN_ID}"

        # Use an absolute path to ensure the script can be found
        chmod +x "${{ github.action_path }}/upload.sh"
        bash "${{ github.action_path }}/upload.sh"

branding:
  icon: "upload-cloud"
  color: "blue"
