name: "upload-to-releases"
author: "ophub"
description: "Upload files to GitHub Releases using the GitHub REST API"
inputs:
  repo:
    description: "Repo name in the form of <owner>/<repo>"
    required: false
    default: "${{ github.repository }}"
  tag:
    description: "Tag name of the release to create or upload assets to (e.g. v1.0.0)"
    required: true
    default: ""
  artifacts:
    description: "File path(s) to upload as release assets"
    required: true
    default: ""
  allow_updates:
    description: "Update the release metadata if a release for the given tag already exists (true/false)"
    required: false
    default: "true"
  remove_artifacts:
    description: "Remove ALL existing assets from the release before uploading new ones (true/false)"
    required: false
    default: "false"
  replaces_artifacts:
    description: "Replace an existing asset that has the same filename (true/false)"
    required: false
    default: "true"
  upload_timeout:
    description: "Per-file upload timeout in minutes (default: 5)"
    required: false
    default: "5"
  make_latest:
    description: "Mark this release as the latest release (true/false/legacy)"
    required: false
    default: "true"
  prerelease:
    description: "Mark this release as a pre-release (true/false)"
    required: false
    default: "false"
  draft:
    description: "Mark this release as a draft (true/false)"
    required: false
    default: "false"
  name:
    description: "Display name of the release. Falls back to the tag name when omitted"
    required: false
    default: ""
  body:
    description: "Markdown body text for the release (may be multi-line)"
    required: false
    default: ""
  body_file:
    description: "Path to a Markdown file whose content is used as the release body (takes precedence over body)"
    required: false
    default: ""
  out_log:
    description: "Output detailed JSON logs for each step — useful for debugging (true/false)"
    required: false
    default: "false"
  gh_token:
    description: "GitHub token used to authenticate API requests (requires contents: write)"
    required: true
    default: ""

outputs:
  release_id:
    description: "Numeric ID of the created or updated release"
    value: ${{ steps.upload.outputs.release_id }}
  html_url:
    description: "HTML URL of the release page"
    value: ${{ steps.upload.outputs.html_url }}
  upload_url:
    description: "Asset upload URL for the release"
    value: ${{ steps.upload.outputs.upload_url }}
  assets:
    description: "JSON object mapping each uploaded filename to its download URL"
    value: ${{ steps.upload.outputs.assets }}

runs:
  using: "composite"
  steps:
    - id: upload
      shell: bash
      # All inputs that may contain arbitrary text (body, name, paths, …) are
      # passed as environment variables rather than command-line arguments.
      # This avoids shell-quoting issues with multi-line strings, special
      # characters, and glob patterns.
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_TAG: ${{ inputs.tag }}
        INPUT_ARTIFACTS: ${{ inputs.artifacts }}
        INPUT_ALLOW_UPDATES: ${{ inputs.allow_updates }}
        INPUT_REMOVE_ARTIFACTS: ${{ inputs.remove_artifacts }}
        INPUT_REPLACES_ARTIFACTS: ${{ inputs.replaces_artifacts }}
        INPUT_UPLOAD_TIMEOUT: ${{ inputs.upload_timeout }}
        INPUT_MAKE_LATEST: ${{ inputs.make_latest }}
        INPUT_PRERELEASE: ${{ inputs.prerelease }}
        INPUT_DRAFT: ${{ inputs.draft }}
        INPUT_NAME: ${{ inputs.name }}
        INPUT_BODY: ${{ inputs.body }}
        INPUT_BODY_FILE: ${{ inputs.body_file }}
        INPUT_OUT_LOG: ${{ inputs.out_log }}
      run: |
        #======================================= Define common functions =======================================
        #
        # Error output formatting
        ERROR="[\033[91m ERROR \033[0m]"
        error_msg() {
            echo -e "${ERROR} ${1}"
            exit 1
        }
        #
        # Validate boolean parameter
        validate_boolean() {
            local var="${1}" param_name="${2}"
            if [[ ! "${var}" =~ ^(true|false)$ ]]; then
                error_msg "Invalid value for ${param_name}: '${var}' must be 'true' or 'false'."
            fi
        }
        #
        # Validate make_latest parameter
        validate_latest() {
            local var="${1}" param_name="${2}"
            if [[ ! "${var}" =~ ^(true|false|legacy)$ ]]; then
                error_msg "Invalid value for ${param_name}: '${var}' must be 'true', 'false', or 'legacy'."
            fi
        }
        #
        # Validate upload_timeout parameter (must be a non-negative integer)
        validate_timeout() {
            local var="${1}"
            if [[ ! "${var}" =~ ^[0-9]+$ ]]; then
                error_msg "Invalid value for upload_timeout: '${var}' — must be a non-negative integer (minutes)."
            fi
        }
        #
        #====================================== Validate input parameters ======================================
        #
        # Print the action path and workflow run ID for diagnostics
        echo -e "Action path: ${{ github.action_path }}"
        echo -e "Workflow Run ID: ${GITHUB_RUN_ID}"
        #
        # Validate required inputs
        [[ -z "${GH_TOKEN}" ]]        && error_msg "The 'gh_token' input is required."
        [[ -z "${INPUT_TAG}" ]]       && error_msg "The 'tag' input is required."
        [[ -z "${INPUT_ARTIFACTS}" ]] && error_msg "The 'artifacts' input is required."
        #
        # Validate optional boolean / enum inputs
        [[ -n "${INPUT_ALLOW_UPDATES}" ]]       && validate_boolean  "${INPUT_ALLOW_UPDATES}"       "allow_updates"
        [[ -n "${INPUT_REMOVE_ARTIFACTS}" ]]    && validate_boolean  "${INPUT_REMOVE_ARTIFACTS}"    "remove_artifacts"
        [[ -n "${INPUT_REPLACES_ARTIFACTS}" ]]  && validate_boolean  "${INPUT_REPLACES_ARTIFACTS}"  "replaces_artifacts"
        [[ -n "${INPUT_MAKE_LATEST}" ]]         && validate_latest   "${INPUT_MAKE_LATEST}"         "make_latest"
        [[ -n "${INPUT_PRERELEASE}" ]]          && validate_boolean  "${INPUT_PRERELEASE}"          "prerelease"
        [[ -n "${INPUT_DRAFT}" ]]               && validate_boolean  "${INPUT_DRAFT}"               "draft"
        [[ -n "${INPUT_OUT_LOG}" ]]             && validate_boolean  "${INPUT_OUT_LOG}"             "out_log"
        [[ -n "${INPUT_UPLOAD_TIMEOUT}" ]]      && validate_timeout  "${INPUT_UPLOAD_TIMEOUT}"
        #
        #===================================== Invoke the upload script ========================================
        #
        # Invoke upload.sh using its absolute path to ensure the script is found regardless
        # of the current working directory. The runner sets the working directory to
        # GITHUB_WORKSPACE by default, so relative artifact paths resolve correctly.
        # All parameters are already available as INPUT_* env vars — no CLI args needed.
        chmod +x "${{ github.action_path }}/upload.sh"
        bash "${{ github.action_path }}/upload.sh"
        #
        #=========================================== End of script =============================================

branding:
  icon: "upload-cloud"
  color: "blue"
